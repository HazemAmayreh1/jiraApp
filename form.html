<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    
    <form action="/submit" method="post">
        
        <label for="ppu">Name:</label>
        <input type="text" id="ppu" name="username">

        <br><br>

        <label for="pass">Password:</label>
        <input type="password" id="pass" name="password">

        <br><br>

        <label for="em">Email:</label>
        <input type="email" id="em" name="email">

        <br><br>

        <label for="msg">Message : </label>
        <br>
        <textarea name="messgae" id="msg"></textarea>

            <br><br>

        <label for="city">City</label>
        <select name="city" id="city">
            <option value="1">Dura</option>
            <option value="2">Hebron</option>
        </select>
        <br><br>

        <label>Gender:</label>

        <input type="radio" id="ma" name="gender"  value="male">
        <label for="ma">Male</label>

        <input type="radio" id="fe" name="gender" value="female">
        <label for="fe">Female</label>

        <br><br>

        <label>Hobbies:</label>
        <input type="checkbox" value="sport" id="sp" name="hobby">
        <label for="sp">Sport</label>

        <input type="checkbox" value="reading" id="re" name="hobby">
        <label for="re">Reading</label>

        <input type="checkbox" value="music" id="mu" name="hobby" >
        <label for="mu">Music</label>
     

       <br><br>

       <input type="submit" value="Send">


      

    

        
     








    </form>
</body>
</html>
